version: '3.8'

services:
  bolt-new-any-llm:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NODE_ENV=development
      - VITE_HOST=0.0.0.0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VITE_LOG_LEVEL=${VITE_LOG_LEVEL:-debug}
    volumes:
      - "bolt_app:/app"
      - "bolt_node_modules:/app/node_modules"
    command: sh -c "pnpm install && remix vite:dev"
    healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5173"]
    interval: 30s
    timeout: 10s
    retries: 3
  # Improve container restart behavior
  restart: unless-stopped
  # Add resource limits
  deploy:
    resources:
      limits:
        memory: 2G
      reservations:
        memory: 512M